[status]
name = "Show installed Julia versions"
command = "/bin/bash scripts/actions/juliaup_status"
description.en = "Show installed Julia versions via juliaup."
description.fr = "Afficher les versions Julia installées via juliaup."

[add]
name = "Install Julia version"
command = "/bin/bash scripts/actions/juliaup_add"
description.en = "Install a Julia version or channel via juliaup."
description.fr = "Installer une version ou un canal Julia via juliaup."

[add.arguments.version]
type = "string"
ask.en = "Version or channel to install (e.g. 1.11, lts, release, nightly)"
ask.fr = "Version ou canal à installer (ex. 1.11, lts, release, nightly)"
example = "lts"

[remove]
name = "Remove Julia version"
command = "/bin/bash scripts/actions/juliaup_remove"
description.en = "Remove a Julia version via juliaup."
description.fr = "Supprimer une version Julia via juliaup."

[remove.arguments.version]
type = "string"
ask.en = "Version or channel to remove (e.g. 1.10, lts)"
ask.fr = "Version ou canal à supprimer (ex. 1.10, lts)"
example = "1.10"

[default]
name = "Set default Julia version"
command = "/bin/bash scripts/actions/juliaup_default"
description.en = "Set the default Julia version via juliaup."
description.fr = "Définir la version Julia par défaut via juliaup."

[default.arguments.version]
type = "string"
ask.en = "Version or channel to set as default (e.g. 1.11, lts)"
ask.fr = "Version ou canal à définir par défaut (ex. 1.11, lts)"
example = "1.11"

[update_versions]
name = "Update Julia versions"
command = "/bin/bash scripts/actions/juliaup_update"
description.en = "Update installed Julia versions via juliaup."
description.fr = "Mettre à jour les versions Julia installées via juliaup."

[update_juliaup]
name = "Update juliaup"
command = "/bin/bash scripts/actions/juliaup_self_update"
description.en = "Update the juliaup tool itself."
description.fr = "Mettre à jour l’outil juliaup."
